<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mac Monitor — Documentation</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📘</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
<style>
  :root {
    --theme-color: #6ecbf5;
    --base-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --code-font-family: "SF Mono", "Fira Code", "Courier New", monospace;
    --sidebar-width: 18rem;
  }
  body { font-family: var(--base-font-family); }
  .sidebar { background: #f8f9fa; }
  .sidebar ul li a { color: #333; font-size: 14px; }
  .sidebar ul li a:hover { color: var(--theme-color); }
  .sidebar ul li.active > a { color: var(--theme-color); border-right: 2px solid var(--theme-color); }
  .markdown-section h1 { font-size: 1.8rem; }
  .markdown-section h2 { font-size: 1.4rem; border-bottom: 1px solid #eee; padding-bottom: 0.3rem; }
  .markdown-section h3 { font-size: 1.15rem; }
  .markdown-section code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
  .markdown-section pre { background: #f6f8fa; border-radius: 6px; }
  .markdown-section pre code { background: transparent; }
  .markdown-section table { display: table; width: 100%; }
  .markdown-section th, .markdown-section td { padding: 10px 14px; }
  .markdown-section blockquote { color: #666; border-left: 4px solid var(--theme-color); }
  .app-name-link { font-weight: 700; font-size: 1.2rem; color: #333 !important; }

  .lang-bar {
    display: flex; gap: 4px; justify-content: center; padding: 12px 0 4px;
    border-bottom: 1px solid #eee; margin-bottom: 8px;
  }
  .lang-bar a {
    font-size: 12px; padding: 3px 10px; border-radius: 12px;
    text-decoration: none; color: #888; font-weight: 600;
  }
  .lang-bar a.active { background: #6ecbf5; color: #fff; }
  .lang-bar a:hover:not(.active) { color: #333; }

  .sidebar-nav { margin-top: 0; }
  .sidebar > h1 { text-align: center; margin: 0; }
  .sidebar-toggle { display: none; }

  /* RTL support for Arabic */
  [dir="rtl"] .markdown-section { direction: rtl; text-align: right; }
  [dir="rtl"] .sidebar { direction: rtl; }
  [dir="rtl"] .sidebar ul li.active > a { border-right: none; border-left: 2px solid var(--theme-color); }
</style>
</head>
<body>
<div id="app"></div>

<script>
  window.$docsify = {
    name: 'Mac Monitor',
    repo: 'https://github.com/MyLhassane/mac-monitor',
    basePath: window.location.search.includes('lang=ar') ? 'ar/' : 'en/',
    loadSidebar: true,
    loadNavbar: false,
    coverpage: false,
    autoHeader: false,
    maxLevel: 3,
    subMaxLevel: 2,
    search: {
      maxAge: 86400000,
      paths: 'auto',
      placeholder: 'Search docs...',
      noData: 'No results!',
    },
    formatUpdated: '{YYYY-MM-DD}',
    plugins: [
      function(hook, vm) {
        hook.afterEach(function(html) {
          const lang = vm.route.path.includes('/ar/') ? 'ar' : 'en';
          document.documentElement.lang = lang;
          document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
          return html;
        });
      }
    ],
  };
</script>

<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
