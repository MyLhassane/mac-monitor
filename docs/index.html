<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mac Monitor — Documentation</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📘</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
<style>
  :root {
    --theme-color: #6ecbf5;
    --base-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --code-font-family: "SF Mono", "Fira Code", "Courier New", monospace;
    --sidebar-width: 18rem;
  }
  body { font-family: var(--base-font-family); }
  .sidebar { background: #f8f9fa; }
  .sidebar ul li a { color: #333; font-size: 14px; }
  .sidebar ul li a:hover { color: var(--theme-color); }
  .sidebar ul li.active > a { color: var(--theme-color); border-right: 2px solid var(--theme-color); }
  .markdown-section h1 { font-size: 1.8rem; }
  .markdown-section h2 { font-size: 1.4rem; border-bottom: 1px solid #eee; padding-bottom: 0.3rem; }
  .markdown-section h3 { font-size: 1.15rem; }
  .markdown-section code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
  .markdown-section pre { background: #f6f8fa; border-radius: 6px; }
  .markdown-section pre code { background: transparent; }
  .markdown-section .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .markdown-section table { width: 100%; }
  .markdown-section th, .markdown-section td { padding: 10px 14px; }
  @media (max-width: 768px) {
    .markdown-section .table-wrapper { margin: 0 -16px; }
    .markdown-section table { white-space: nowrap; }
  }
  .markdown-section blockquote { color: #666; border-left: 4px solid var(--theme-color); }
  .app-name-link { font-weight: 700; font-size: 1.2rem; color: #333 !important; }
  .sidebar-nav { margin-top: 0; }
  .sidebar > h1 { text-align: center; margin: 0; }

  .sidebar-toggle {
    background: #6ecbf5; border-radius: 0 6px 6px 0;
    padding: 10px 12px; z-index: 100;
  }
  .sidebar-toggle span { background: #fff; }
  .sidebar-toggle:hover { background: #5ab8e8; }

  /* ===== language toggle (fixed, outside Docsify) ===== */
  .docs-lang-toggle {
    position: fixed; top: 12px; left: 60px; z-index: 999;
    background: #fff; border: 1px solid #ddd; border-radius: 20px;
    padding: 3px; display: flex; gap: 2px; box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .docs-lang-toggle a {
    font-size: 12px; padding: 4px 12px; border-radius: 16px;
    text-decoration: none; color: #888; font-weight: 600; cursor: pointer;
  }
  .docs-lang-toggle a:hover { color: #333; }
  .docs-lang-toggle a.active { background: #6ecbf5; color: #fff; }

  /* ===== back-to-main ===== */
  .docs-back {
    position: fixed; top: 14px; right: 60px; z-index: 999;
    font-size: 13px; color: #888; text-decoration: none; font-weight: 500;
  }
  .docs-back:hover { color: #6ecbf5; }

  /* ===== RTL ===== */
  [dir="rtl"] .docs-lang-toggle { left: auto; right: 60px; }
  [dir="rtl"] .docs-back { right: auto; left: 60px; }
  [dir="rtl"] .markdown-section { direction: rtl; text-align: right; }
  [dir="rtl"] .markdown-section code,
  [dir="rtl"] .markdown-section pre,
  [dir="rtl"] .markdown-section pre code,
  [dir="rtl"] .markdown-section tt {
    direction: ltr !important;
    text-align: left !important;
    unicode-bidi: embed;
  }
  [dir="rtl"] .sidebar { direction: rtl; }
  [dir="rtl"] .sidebar ul li.active > a { border-right: none; border-left: 2px solid var(--theme-color); }

  @media (max-width: 768px) {
    .sidebar { z-index: 200; }
    .docs-lang-toggle { top: 8px; left: 56px; }
    .docs-lang-toggle a { font-size: 11px; padding: 3px 8px; }
    .docs-back { top: 10px; right: 12px; font-size: 12px; }
    [dir="rtl"] .docs-back { right: auto; left: 12px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<div class="docs-lang-toggle">
  <a id="dl-en" href="#" onclick="switchLang('en');return false;">EN</a>
  <a id="dl-ar" href="#" onclick="switchLang('ar');return false;">AR</a>
</div>

<a class="docs-back" href="#" onclick="goHome();return false;">← Back</a>

<script>
  var currentLang = (function() {
    var p = new URLSearchParams(window.location.search);
    return p.get('lang') || localStorage.getItem('mm-docs-lang') || 'en';
  })();

  function switchLang(lang) {
    localStorage.setItem('mm-docs-lang', lang);
    if (lang !== currentLang) {
      var url = window.location.pathname + '?lang=' + lang + window.location.hash;
      window.location.href = url;
    }
  }

  function goHome() {
    var depth = window.location.pathname.replace(/\/+$/, '').split('/').length - 1;
    var up = '../'.repeat(Math.max(depth - 1, 0)) || './';
    window.location.href = up + 'index.html';
  }

  (function() {
    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    document.getElementById('dl-en').classList.toggle('active', currentLang === 'en');
    document.getElementById('dl-ar').classList.toggle('active', currentLang === 'ar');

    window.$docsify = {
      name: 'Mac Monitor',
      repo: 'https://github.com/MyLhassane/mac-monitor',
      basePath: currentLang === 'ar' ? 'ar/' : 'en/',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: false,
      autoHeader: false,
      maxLevel: 3,
      subMaxLevel: 2,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs...',
        noData: 'No results!',
        depth: 3,
      },
    };
  })();
</script>

<script src="https://cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
