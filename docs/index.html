<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mac Monitor — Documentation</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📘</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
<style>
  :root {
    --theme-color: #6ecbf5a8;
    --base-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --code-font-family: "SF Mono", "Fira Code", "Courier New", monospace;
    --sidebar-width: 18rem;
    --mm-font-scale: 1;
    --mm-line-scale: 1;
  }
  body { font-family: var(--base-font-family); }
  .sidebar { background: #f8f9fa; }
  .sidebar ul li a { color: #333; font-size: 16px; }
  .sidebar ul li a:hover { color: var(--theme-color); }
  .sidebar ul li.active > a { color: var(--theme-color); border-right: 2px solid var(--theme-color); }
  .markdown-section h1 { font-size: 1.8rem; }
  .markdown-section h2 { font-size: 1.4rem; border-bottom: 1px solid #eee; padding-bottom: 0.3rem; }
  .markdown-section h3 { font-size: 1.15rem; }
  .markdown-section code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
  .markdown-section pre { background: #f6f8fa; border-radius: 6px; }
  .markdown-section pre code { background: transparent; }
  .markdown-section .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .markdown-section table { width: 100%; }
  .markdown-section th, .markdown-section td { padding: 10px 14px; }
  @media (max-width: 768px) {
    .markdown-section .table-wrapper { margin: 0 -16px; }
    .markdown-section table { white-space: nowrap; }
  }
  .markdown-section blockquote { color: #666; border-left: 4px solid var(--theme-color); }
  .app-name-link { font-weight: 700; font-size: 1.2rem; color: #333 !important; }
  .sidebar-nav { margin-top: 0; }
  .sidebar > h1 { text-align: center; margin: 0; }

  .sidebar-toggle {
    background: #6ecbf5a8; border-radius: 0 6px 6px 0;
    padding: 10px 12px; z-index: 100;
  }
  .sidebar-toggle span { background: #fff; }
  .sidebar-toggle:hover { background: #5ab8e8; }

  /* ===== Sidebar top bar (language toggle + back) ===== */
  .sidebar-top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; border-bottom: 1px solid #eee;
  }
  .sidebar-lang-toggle {
    display: flex; gap: 2px; background: #f0f0f0; border-radius: 16px; padding: 2px;
  }
  .sidebar-lang-toggle a {
    font-size: 11px; padding: 3px 10px; border-radius: 14px;
    text-decoration: none; color: #888; font-weight: 600; cursor: pointer;
  }
  .sidebar-lang-toggle a:hover { color: #333; }
  .sidebar-lang-toggle a.active { background: #6ecbf5a8; color: #fff; }
  .sidebar-back {
    font-size: 12px; color: #888; text-decoration: none; font-weight: 500; white-space: nowrap;
  }
  .sidebar-back:hover { color: #6ecbf5a8; }
  [dir="rtl"] .sidebar-back { white-space: nowrap; }
  .sidebar-controls { display: flex; align-items: center; gap: 1px; margin: 0 4px; }
  .sc-btn {
    background: none; border: none; color: #666; cursor: pointer;
    font-size: 11px; font-weight: 700; padding: 2px 5px; border-radius: 4px;
    line-height: 1; font-family: inherit;
  }
  .sc-btn:hover { color: #6ecbf5a8; background: #ffffff10; }
  .sc-sep { width: 1px; height: 14px; background: #2a2a4a; margin: 0 2px; flex-shrink: 0; }

  /* ===== RTL sidebar fixes ===== */
  [dir="rtl"] .sidebar-nav { margin-right: 10px; }
  [dir="rtl"] body.close .sidebar {
    transform: translateX(300px) !important;
  }
  [dir="rtl"] body.close section.content {
    right: 0 !important;
  }
  [dir="rtl"] .sidebar {
    left: auto; right: 0; direction: rtl;
  }
  [dir="rtl"] .sidebar ul li.active > a {
    border-right: none; border-left: 2px solid var(--theme-color);
  }
  [dir="rtl"] .sidebar-toggle { left: auto; right: 0; border-radius: 6px 0 0 6px; }
  [dir="rtl"] section.content {
    left: auto; right: 300px;
  }
  [dir="rtl"] .github-corner {
    right: auto; left: 0;
  }
  [dir="rtl"] .github-corner svg { transform: scaleX(-1); }
  [dir="rtl"] .markdown-section {
    direction: rtl; text-align: right;
    font-family: "Noto Naskh Arabic", "Tajawal", "Cairo", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  [dir="rtl"] .markdown-section code {
    font-size: 0.85rem !important;
    line-height: 1.8 !important;
  }
  [dir="rtl"] .markdown-section pre code {
    font-size: 0.82rem !important;
    line-height: 1.7 !important;
  }
  [dir="rtl"] .markdown-section code,
  [dir="rtl"] .markdown-section pre:not([data-lang="ar"]),
  [dir="rtl"] .markdown-section pre:not([data-lang="ar"]) code,
  [dir="rtl"] .markdown-section tt {
    direction: ltr !important;
    text-align: left !important;
    unicode-bidi: embed;
  }
  [dir="rtl"] .markdown-section pre[data-lang="ar"],
  [dir="rtl"] .markdown-section pre[data-lang="ar"] code {
    direction: rtl !important;
    text-align: right !important;
  }
  .markdown-section pre[data-lang="ar"]::after {
    display: none !important;
  }

  @media (max-width: 768px) {
    .sidebar { z-index: 200; }
    .sidebar-toggle { z-index: 300; }
    body.close .sidebar-toggle { background: #6ecbf5a8; }
    [dir="rtl"] .sidebar {
      transform: translateX(300px);
    }
    [dir="rtl"] body.close .sidebar {
      transform: translateX(0) !important;
    }
  [dir="rtl"] .sidebar-toggle { left: auto; right: 0; border-radius: 6px 0 0 6px; }
  }

  /* ===== DARK THEME ===== */
  ::selection { background: #6ecbf540; color: #fff; }
  body { background: #0a0a0f; color: #e0e0e0; }
  .sidebar {
    background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
    border-right: 1px solid #1e1e3a;
  }
  .sidebar > h1 a { color: #e0e0e0 !important; }
  .sidebar ul li a { color: #aaa !important; }
  .sidebar ul li a:hover { color: #6ecbf5a8 !important; }
  .sidebar ul li.active > a { color: #6ecbf5a8 !important; border-right-color: #6ecbf5a8; }
  .content { background: #0a0a0f; }
  .markdown-section { color: #e0e0e0; }
  .markdown-section p,
  .markdown-section li {
    font-size: calc(1em * var(--mm-font-scale)) !important;
    line-height: calc(1.6rem * var(--mm-line-scale)) !important;
  }
  .markdown-section h1,
  .markdown-section h2,
  .markdown-section h3,
  .markdown-section h4,
  .markdown-section strong { color: #eee; }
  .markdown-section a { color: #6ecbf5a8; }
  .markdown-section code { background: #1a1a2e; color: #e0e0e0; }
  .markdown-section pre { background: #0d0d1a; }
  .markdown-section pre code { background: transparent; }
  .markdown-section th,
  .markdown-section td { border-color: #1e1e3a; }
  .markdown-section tr { border-top-color: #1e1e3a; }
  .markdown-section tr:nth-child(2n) { background: #111122; }
  .markdown-section blockquote { color: #888; border-left-color: #6ecbf5a8; }
  .markdown-section p.tip { background: #111122; }
  .markdown-section .token.cdata,
  .markdown-section .token.comment,
  .markdown-section .token.doctype,
  .markdown-section .token.prolog { color: #666; }
  .search { border-bottom: 1px solid #1e1e3a; }
  .search input { background: #0a0a0f; color: #e0e0e0; }
  .search input::placeholder { color: #666; }
  .search .search-keyword { color: #6ecbf5a8; }
  .sidebar-top-bar { border-bottom-color: #1e1e3a; }
  .sidebar-lang-toggle { background: #1a1a2e; }
  .sidebar-lang-toggle a { color: #666; }
  .sidebar-lang-toggle a.active { color: #0a0a0f; }
  .sidebar-back { color: #888; }
  .sidebar-back:hover { color: #6ecbf5a8; }

  /* ===== LIGHT THEME ===== */
  [data-theme="light"] body { background: #fff; color: #34495e; }
  [data-theme="light"] .sidebar {
    background: linear-gradient(135deg, #f8f9fa 0%, #eef1f5 100%);
    border-right-color: #e0e0e0;
  }
  [data-theme="light"] .sidebar > h1 a { color: #333 !important; }
  [data-theme="light"] .sidebar ul li a { color: #555 !important; }
  [data-theme="light"] .sidebar ul li a:hover { color: #6ecbf5a8 !important; }
  [data-theme="light"] .sidebar ul li.active > a { color: #6ecbf5a8 !important; border-right-color: #6ecbf5a8; }
  [data-theme="light"] .content { background: #fff; }
  [data-theme="light"] .markdown-section { color: #34495e; }
  [data-theme="light"] .markdown-section h1,
  [data-theme="light"] .markdown-section h2,
  [data-theme="light"] .markdown-section h3,
  [data-theme="light"] .markdown-section h4,
  [data-theme="light"] .markdown-section strong { color: #2c3e50; }
  [data-theme="light"] .markdown-section a { color: #6ecbf5a8; }
  [data-theme="light"] .markdown-section code { background: #f0f0f0; color: #333; }
  [data-theme="light"] .markdown-section pre { background: #f6f8fa; }
  [data-theme="light"] .markdown-section pre code { background: transparent; }
  [data-theme="light"] .markdown-section th,
  [data-theme="light"] .markdown-section td { border-color: #ddd; }
  [data-theme="light"] .markdown-section tr { border-top-color: #ccc; }
  [data-theme="light"] .markdown-section tr:nth-child(2n) { background: #f8f8f8; }
  [data-theme="light"] .markdown-section blockquote { color: #666; border-left-color: #6ecbf5a8; }
  [data-theme="light"] .markdown-section p.tip { background: #f8f8f8; }
  [data-theme="light"] .search { border-bottom-color: #e0e0e0; }
  [data-theme="light"] .search input { background: #fff; color: #333; }
  [data-theme="light"] .search input::placeholder { color: #999; }
  [data-theme="light"] .search .search-keyword { color: #6ecbf5a8; }
  [data-theme="light"] .sidebar-top-bar { border-bottom-color: #e0e0e0; }
  [data-theme="light"] .sidebar-lang-toggle { background: #e8e8e8; }
  [data-theme="light"] .sidebar-lang-toggle a { color: #999; }
  [data-theme="light"] .sidebar-lang-toggle a.active { color: #fff; background: #6ecbf5a8; }
  [data-theme="light"] .sidebar-back { color: #999; }
  [data-theme="light"] .sidebar-back:hover { color: #6ecbf5a8; }
  [data-theme="light"] .sc-btn { color: #999; }
  [data-theme="light"] .sc-btn:hover { color: #6ecbf5a8; background: #00000008; }
  [data-theme="light"] .sc-sep { background: #ddd; }
</style>
</head>
<body>
<div id="app"></div>

<script>
  var currentLang = (function() {
    var p = new URLSearchParams(window.location.search);
    return p.get('lang') || localStorage.getItem('mm-docs-lang') || 'en';
  })();

  function switchLang(lang) {
    localStorage.setItem('mm-docs-lang', lang);
    if (lang !== currentLang) {
      var url = window.location.pathname + '?lang=' + lang + window.location.hash;
      window.location.href = url;
    }
  }

  function goHome() {
    var depth = window.location.pathname.replace(/\/+$/, '').split('/').length - 1;
    var up = '../'.repeat(Math.max(depth - 1, 0)) || './';
    window.location.href = up + 'index.html';
  }

  function getScale(key, def) {
    return parseFloat(localStorage.getItem('mm-docs-' + key)) || def;
  }
  function adjScale(key, delta) {
    var val = Math.round((getScale(key, 1) + delta) * 10) / 10;
    val = Math.min(Math.max(val, 0.7), 1.5);
    if (val === 1) localStorage.removeItem('mm-docs-' + key);
    else localStorage.setItem('mm-docs-' + key, val);
    applyScales();
  }
  function applyScales() {
    document.documentElement.style.setProperty('--mm-font-scale', getScale('font-scale', 1));
    document.documentElement.style.setProperty('--mm-line-scale', getScale('line-scale', 1));
  }

  function getTheme() {
    return localStorage.getItem('mm-docs-theme') || 'dark';
  }
  function toggleTheme() {
    var t = getTheme() === 'dark' ? 'light' : 'dark';
    localStorage.setItem('mm-docs-theme', t);
    document.documentElement.setAttribute('data-theme', t);
    var btn = document.querySelector('.sc-theme-btn');
    if (btn) {
      var isAr = document.documentElement.dir === 'rtl';
      btn.textContent = t === 'dark' ? '\u2600\ufe0f' : '\ud83c\udf19';
      btn.title = isAr ? (t === 'dark' ? '\u0627\u0644\u0648\u0636\u0639 \u0627\u0644\u0641\u0627\u062a\u062d' : '\u0627\u0644\u0648\u0636\u0639 \u0627\u0644\u063a\u0627\u0645\u0642') : (t === 'dark' ? 'Light mode' : 'Dark mode');
    }
  }

  (function() {
    document.documentElement.lang = currentLang;
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    document.documentElement.setAttribute('data-theme', getTheme());
    applyScales();

    window.$docsify = {
      name: 'Mac Monitor',
      repo: 'https://github.com/MyLhassane/mac-monitor',
      basePath: currentLang === 'ar' ? 'ar/' : 'en/',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: false,
      autoHeader: false,
      maxLevel: 3,
      subMaxLevel: 2,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs...',
        noData: 'No results!',
        depth: 3,
      },
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            var sidebar = document.querySelector('.sidebar');
            if (!sidebar) return;

            var existing = sidebar.querySelector('.sidebar-top-bar');
            if (existing) existing.remove();

            var search = sidebar.querySelector('.search');
            var appName = sidebar.querySelector('h1.app-name');
            if (!search || !appName) return;

            var isAr = document.documentElement.dir === 'rtl';

            var topBar = document.createElement('div');
            topBar.className = 'sidebar-top-bar';

            var langToggle = document.createElement('div');
            langToggle.className = 'sidebar-lang-toggle';
            langToggle.innerHTML =
              '<a href="#" onclick="switchLang(\'en\');return false;"' +
              (isAr ? '' : ' class="active"') + '>EN</a>' +
              '<a href="#" onclick="switchLang(\'ar\');return false;"' +
              (isAr ? ' class="active"' : '') + '>AR</a>';

            var backBtn = document.createElement('a');
            backBtn.href = '#';
            backBtn.className = 'sidebar-back';
            backBtn.onclick = function() { goHome(); return false; };
            backBtn.textContent = isAr ? '\u2192 \u0639\u0648\u062f\u0629' : '\u2190 Back';

            var theme = getTheme();
            var controls = document.createElement('div');
            controls.className = 'sidebar-controls';
            controls.innerHTML =
              '<button class="sc-btn" onclick="adjScale(\'font-scale\',-0.1)" title="' + (isAr ? '\u062a\u0635\u063a\u064a\u0631 \u0627\u0644\u062e\u0637' : 'Smaller text') + '">A\u207b</button>' +
              '<button class="sc-btn" onclick="adjScale(\'font-scale\',0.1)" title="' + (isAr ? '\u062a\u0643\u0628\u064a\u0631 \u0627\u0644\u062e\u0637' : 'Larger text') + '">A\u207a</button>' +
              '<span class="sc-sep"></span>' +
              '<button class="sc-btn" onclick="adjScale(\'line-scale\',-0.1)" title="' + (isAr ? '\u062a\u0642\u0631\u064a\u0628 \u0627\u0644\u0623\u0633\u0637\u0631' : 'Tighter lines') + '">\u00b6\u207b</button>' +
              '<button class="sc-btn" onclick="adjScale(\'line-scale\',0.1)" title="' + (isAr ? '\u062a\u0628\u0627\u0639\u062f \u0627\u0644\u0623\u0633\u0637\u0631' : 'Wider lines') + '">\u00b6\u207a</button>' +
              '<span class="sc-sep"></span>' +
              '<button class="sc-btn sc-theme-btn" onclick="toggleTheme(); return false;" title="' + (isAr ? (theme === 'dark' ? '\u0627\u0644\u0648\u0636\u0639 \u0627\u0644\u0641\u0627\u062a\u062d' : '\u0627\u0644\u0648\u0636\u0639 \u0627\u0644\u063a\u0627\u0645\u0642') : (theme === 'dark' ? 'Light mode' : 'Dark mode')) + '">' + (theme === 'dark' ? '\u2600\ufe0f' : '\ud83c\udf19') + '</button>';

            topBar.appendChild(backBtn);
            topBar.appendChild(controls);
            topBar.appendChild(langToggle);

            sidebar.insertBefore(topBar, appName);
          });
        }
      ]
    };
  })();
</script>

<script src="https://cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
